<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L1GHT Video Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --accent: #3a9bff; --accent-h: #5aafff;
      --text: #e6edf3; --muted: #8b949e; --success: #3fb950;
      --error: #f85149; --radius: 12px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    header { width: 100%; background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 32px; text-align: center; }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
    header p { color: var(--muted); font-size: .9rem; margin-top: 4px; }
    main { width: 100%; max-width: 720px; padding: 32px 16px 64px; display: flex; flex-direction: column; gap: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .url-row { display: flex; gap: 10px; }
    .url-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .95rem; padding: 10px 14px; outline: none; transition: border-color .2s; }
    .url-row input:focus { border-color: var(--accent); }
    .url-row input::placeholder { color: var(--muted); }
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: background .2s, opacity .2s; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover:not(:disabled) { filter: brightness(1.1); }
    .quality-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .quality-row label { font-size: .82rem; color: var(--muted); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; align-self: center; margin-right: 4px; }
    .q-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: .85rem; cursor: pointer; transition: all .2s; font-weight: 600; }
    .q-btn.active, .q-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(58,155,255,.12); }
    #info-card { display: none; }
    .info-inner { display: flex; gap: 16px; align-items: flex-start; }
    .thumb-wrap { flex-shrink: 0; width: 140px; height: 79px; border-radius: 8px; overflow: hidden; background: var(--surface2); }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .info-text h3 { font-size: .95rem; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
    .info-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: .8rem; color: var(--muted); }
    .info-meta span { display: flex; align-items: center; gap: 4px; }
    #progress-card { display: none; }
    .progress-label { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-bottom: 8px; }
    .progress-track { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #9b72ff); border-radius: 99px; width: 0%; transition: width .4s ease; }
    .progress-meta { display: flex; gap: 18px; margin-top: 10px; font-size: .82rem; color: var(--muted); }
    #result-card { display: none; }
    .result-inner { display: flex; align-items: center; gap: 14px; }
    .result-icon { font-size: 2rem; }
    .result-text { flex: 1; }
    .result-text p { color: var(--muted); font-size: .85rem; margin-top: 4px; }
    #error-card { display: none; }
    .error-inner { display: flex; align-items: flex-start; gap: 12px; color: var(--error); }
    .error-inner p { font-size: .88rem; margin-top: 4px; color: var(--muted); }
    .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { margin-top: auto; padding: 16px; color: var(--muted); font-size: .78rem; text-align: center; }
  </style>
</head>
<body>
<header>
  <h1>L1GHT VIDEO DOWNLOADER</h1>
  <p>Download YouTube videos &amp; audio in the highest quality</p>
</header>
<main>
  <div class="card">
    <div class="url-row">
      <input id="url-input" type="url" placeholder="Paste a YouTube URL…" autocomplete="off" />
      <button class="btn btn-ghost" id="fetch-btn" onclick="fetchInfo()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Fetch
      </button>
    </div>
    <div class="quality-row">
      <label>Quality</label>
      <button class="q-btn active" data-q="best" onclick="setQuality(this)">Best</button>
      <button class="q-btn" data-q="720p" onclick="setQuality(this)">720p</button>
      <button class="q-btn" data-q="480p" onclick="setQuality(this)">480p</button>
      <button class="q-btn" data-q="audio" onclick="setQuality(this)">Audio MP3</button>
    </div>
    <div style="margin-top:20px;display:flex;justify-content:flex-end;">
      <button class="btn btn-primary" id="download-btn" onclick="startDownload()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 12-4-4m4 4 4-4"/><path d="M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17"/></svg>
        Download
      </button>
    </div>
  </div>

  <div class="card" id="info-card">
    <div class="info-inner">
      <div class="thumb-wrap"><img id="thumb" src="" alt="thumbnail" /></div>
      <div class="info-text">
        <h3 id="vid-title">—</h3>
        <div class="info-meta">
          <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="vid-duration">—</span></span>
          <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span id="vid-uploader">—</span></span>
          <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><span id="vid-views">—</span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="card" id="progress-card">
    <div class="progress-label">
      <span id="progress-msg">Downloading…</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-meta">
      <span>Speed: <strong id="prog-speed">—</strong></span>
      <span>ETA: <strong id="prog-eta">—</strong></span>
    </div>
  </div>

  <div class="card" id="result-card">
    <div class="result-inner">
      <div class="result-icon">✅</div>
      <div class="result-text">
        <strong>Download complete!</strong>
        <p id="result-filename">—</p>
      </div>
      <a id="result-link" href="#" class="btn btn-success" download>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 12-4-4m4 4 4-4"/><path d="M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17"/></svg>
        Save File
      </a>
    </div>
  </div>

  <div class="card" id="error-card">
    <div class="error-inner">
      <div style="font-size:1.5rem">⚠️</div>
      <div><strong id="error-title">Error</strong><p id="error-msg">—</p></div>
    </div>
  </div>
</main>
<footer>Powered by yt-dlp &nbsp;·&nbsp; For personal use only &nbsp;·&nbsp; Respect copyright laws</footer>
<script>
  let selectedQuality = 'best';
  function setQuality(el) { document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); selectedQuality = el.dataset.q; }
  function showBlock(id) { document.getElementById(id).style.display = 'block'; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function fmtDuration(s) { if (!s) return '—'; const m = Math.floor(s/60), sec = s%60; return `${m}:${String(sec).padStart(2,'0')}`; }
  function fmtViews(n) { if (!n) return '—'; if (n>=1e6) return (n/1e6).toFixed(1)+'M views'; if (n>=1e3) return (n/1e3).toFixed(0)+'K views'; return n+' views'; }
  function fmtEta(s) { if (!s) return '—'; const m=Math.floor(s/60),sec=s%60; return m?`${m}m ${sec}s`:`${sec}s`; }

  async function fetchInfo() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    hide('info-card'); hide('result-card'); hide('error-card'); hide('progress-card');
    const btn = document.getElementById('fetch-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Fetching…';
    try {
      const res = await fetch('/api/info', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({url}) });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Failed to fetch info');
      document.getElementById('thumb').src = data.thumbnail;
      document.getElementById('vid-title').textContent = data.title;
      document.getElementById('vid-duration').textContent = fmtDuration(data.duration);
      document.getElementById('vid-uploader').textContent = data.uploader || '—';
      document.getElementById('vid-views').textContent = fmtViews(data.view_count);
      showBlock('info-card');
      document.getElementById('download-btn').disabled = false;
    } catch(e) { showError('Could not fetch video info', e.message); }
    finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Fetch`;
    }
  }

  async function startDownload() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    hide('result-card'); hide('error-card');
    showBlock('progress-card');
    setProgress(0, 'Starting download…', '', '');
    const dlBtn = document.getElementById('download-btn');
    dlBtn.disabled = true;
    try {
      const res = await fetch('/api/download', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({url, quality: selectedQuality}) });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Failed to start download');
      listenProgress(data.job_id);
    } catch(e) { hide('progress-card'); showError('Download failed', e.message); dlBtn.disabled = false; }
  }

  function listenProgress(jobId) {
    const es = new EventSource(`/api/progress/${jobId}`);
    es.onmessage = (e) => {
      const d = JSON.parse(e.data);
      if (d.type === 'keepalive') return;
      if (d.type === 'progress') setProgress(d.progress, d.message || `Downloading… ${d.progress}%`, d.speed || '', d.eta);
      else if (d.type === 'done') { es.close(); hide('progress-card'); showResult(d.filename); document.getElementById('download-btn').disabled = false; }
      else if (d.type === 'error') { es.close(); hide('progress-card'); showError('Download failed', d.message); document.getElementById('download-btn').disabled = false; }
    };
    es.onerror = () => { es.close(); hide('progress-card'); showError('Connection lost', 'Lost connection to server.'); document.getElementById('download-btn').disabled = false; };
  }

  function setProgress(pct, msg, speed, eta) {
    document.getElementById('progress-fill').style.width = pct+'%';
    document.getElementById('progress-pct').textContent = pct+'%';
    document.getElementById('progress-msg').textContent = msg;
    document.getElementById('prog-speed').textContent = speed || '—';
    document.getElementById('prog-eta').textContent = fmtEta(eta);
  }

  function showResult(filename) {
    document.getElementById('result-filename').textContent = filename || 'File ready';
    const link = document.getElementById('result-link');
    link.href = `/api/file/${encodeURIComponent(filename)}`;
    link.setAttribute('download', filename);
    showBlock('result-card');
  }

  function showError(title, msg) {
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-msg').textContent = msg;
    showBlock('error-card');
  }

  document.getElementById('url-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') fetchInfo(); });
</script>
</body>
</html>
